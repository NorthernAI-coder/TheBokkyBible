<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>searchQA - The Bokky Bible Chronicles</title>
  <link href="css/vuetify_3.9.5.min.css" rel="stylesheet">
  <link href="css/materialdesignicons_7.4.47.min.css" rel="stylesheet">
  <link href="fonts/materialdesignicons-webfont.woff2" rel="stylesheet">
  <script src="js/vue_3.5.29.prod.js"></script>
  <script src="js/vuetify_3.9.5.min.js"></script>
  <script src="js/marked_4.3.0.min.js"></script>
  <script src="js/dexie_4.3.0.min.js"></script>
  <script src="js/moment_2.24.0.min.js"></script>
  <script src="js/minisearch_7.2.0.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    #app { height: 100vh; }
    .file-link { color: #1976d2; text-decoration: none; }
    .file-link:hover { text-decoration: underline; }
    .markdown-content { line-height: 1.6; }
    .markdown-content h1, .markdown-content h2, .markdown-content h3 { margin-top: 1.5em; }
    .v-window-item { padding: 16px; }
    .chip { margin: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <v-app>
      <v-app-bar color="primary-outline" density="compact">
        <v-app-bar-title>The Bokky Bible Search</v-app-bar-title>
        <v-spacer></v-spacer>
        <v-btn :disabled="sync.info != null" @click="checkForUpdates" text size="large" color="primary" variant="text" class="text-none">
          <v-icon>mdi-refresh-circle</v-icon>
          Refresh
        </v-btn>
        <v-btn v-if="sync.info == null" :disabled="sync.info != null" @click="testIt" text size="large" color="secondary" variant="text" class="text-none">
          <v-icon>mdi-emoticon-cool-outline</v-icon>
          Test
        </v-btn>
        <v-progress-circular v-if="sync.info != null" color="primary" :model-value="sync.total ? (parseInt(sync.completed * 100 / sync.total)) : 0" :size="30" :width="6" v-tooltip="sync.completed + (sync.total ? ('/' + sync.total) : '') + ': ' + sync.info"></v-progress-circular>
        <v-spacer></v-spacer>
        <v-tabs v-model="tab" color="primary" grow>
          <v-tab value="documents" class="text-none mx-0 px-0">Documents</v-tab>
          <v-tab value="qas" class="text-none mx-0 px-0">Questions & Answers</v-tab>
          <v-tab value="keyword" class="text-none mx-0 px-0">Keyword Search</v-tab>
        </v-tabs>
      </v-app-bar>

      <v-main>
        <v-container fluid>

          <v-window v-model="tab" class="mt-4">
            <!-- DOCUMENTS TAB -->
            <v-window-item value="documents">
              <v-row justify="end" class="mb-4">
                <v-col cols="auto">
                  <v-btn-group>
                    <v-btn @click="prevPage('docs')" :disabled="docsPage === 1" icon="mdi-chevron-left"></v-btn>
                    <v-btn @click="nextPage('docs')" :disabled="docsPage >= docsTotalPages" icon="mdi-chevron-right"></v-btn>
                  </v-btn-group>
                </v-col>
                <v-col cols="auto">
                  <v-select v-model="docsPageSize" :items="[10,25,50,100]" label="Page size" density="compact" style="width:120px"></v-select>
                </v-col>
              </v-row>

              <v-data-table
                :items="paginatedDocs"
                :headers="docHeaders"
                :items-per-page="-1"
                hide-default-footer
                class="elevation-1"
              >
                <template v-slot:item.title="{ item }">
                  <a href="#" @click.prevent="viewDocument(item)">{{ item.title }}</a>
                </template>
                <template v-slot:item.keywords="{ item }">
                  <!-- <v-chip v-for="kw in item.keywords" :key="kw" size="small" class="chip">{{ kw }}</v-chip> -->
                  <div class="d-flex flex-wrap">
                    <v-chip
                      v-for="(kw, i) in item.keywords.slice(0, 8)"
                      :key="i"
                      size="small"
                      class="ma-1"
                    >{{ kw }}</v-chip>
                    <v-chip
                      v-if="item.keywords.length > 8"
                      size="small"
                      class="ma-1"
                      color="grey"
                      @click="showAllKeywords(item)"
                    >
                      +{{ item.keywords.length - 8 }} more
                    </v-chip>
                  </div>
                </template>
              </v-data-table>
            </v-window-item>

            <!-- QUESTIONS & ANSWERS TAB -->
            <v-window-item value="qas">
              <v-row justify="end" class="mb-4">
                <v-col cols="auto">
                  <v-btn-group>
                    <v-btn @click="prevPage('qas')" :disabled="qasPage === 1" icon="mdi-chevron-left"></v-btn>
                    <v-btn @click="nextPage('qas')" :disabled="qasPage >= qasTotalPages" icon="mdi-chevron-right"></v-btn>
                  </v-btn-group>
                </v-col>
                <v-col cols="auto">
                  <v-select v-model="qasPageSize" :items="[10,25,50,100]" label="Page size" density="compact" style="width:120px"></v-select>
                </v-col>
              </v-row>

              <v-data-table
                :items="paginatedQAs"
                :headers="qaHeaders"
                :items-per-page="-1"
                hide-default-footer
                class="elevation-1"
              >
                <template v-slot:item.question="{ item }">
                  <a href="#" @click.prevent="viewQA(item)">{{ item.question.substring(0, 120) }}...</a>
                </template>
                <template v-slot:item.keywords="{ item }">
                  <!-- <v-chip v-for="kw in item.keywords" :key="kw" size="small" class="chip">{{ kw }}</v-chip> -->
                  <div class="d-flex flex-wrap">
                    <v-chip
                      v-for="(kw, i) in item.keywords.slice(0, 8)"
                      :key="i"
                      size="small"
                      class="ma-1"
                    >{{ kw }}</v-chip>
                    <v-chip
                      v-if="item.keywords.length > 8"
                      size="small"
                      class="ma-1"
                      color="grey"
                      @click="showAllKeywords(item)"
                    >
                      +{{ item.keywords.length - 8 }} more
                    </v-chip>
                  </div>
                </template>
              </v-data-table>
            </v-window-item>

            <!-- KEYWORD SEARCH TAB -->
            <v-window-item value="keyword">
              <v-row class="mb-4">
                <v-col cols="12" md="6">
                  <v-text-field v-model="searchKeyword" label="Search keywords" prepend-inner-icon="mdi-magnify" clearable @keyup.enter="performKeywordSearch"></v-text-field>
                </v-col>
                <v-col cols="12" md="6">
                  <v-btn @click="performKeywordSearch" color="primary">Search</v-btn>
                </v-col>
              </v-row>

              <v-row justify="end" class="mb-4">
                <v-col cols="auto">
                  <v-btn-group>
                    <v-btn @click="prevPage('search')" :disabled="searchPage === 1" icon="mdi-chevron-left"></v-btn>
                    <v-btn @click="nextPage('search')" :disabled="searchPage >= searchTotalPages" icon="mdi-chevron-right"></v-btn>
                  </v-btn-group>
                </v-col>
                <v-col cols="auto">
                  <v-select v-model="searchPageSize" :items="[10,25,50,100]" label="Page size" density="compact" style="width:120px"></v-select>
                </v-col>
              </v-row>

              <v-data-table
                :items="paginatedSearchResults"
                :headers="searchHeaders"
                :items-per-page="-1"
                hide-default-footer
                class="elevation-1"
              >
                <template v-slot:item.type="{ item }">
                  <v-chip :color="item.type === 'document' ? 'blue' : 'green'" size="small">{{ item.type }}</v-chip>
                </template>
                <template v-slot:item.title="{ item }">
                  <a href="#" @click.prevent="viewSearchItem(item)">{{ item.title }}</a>
                </template>
              </v-data-table>
            </v-window-item>
          </v-window>
        </v-container>
      </v-main>

      <!-- Document / QA Viewer Dialog -->
      <v-dialog v-model="viewerDialog" scrollable height="90vh">
        <v-card>
          <v-toolbar flat density="compact" class="text-h6">
            <v-toolbar-title>{{ viewerTitle }}</v-toolbar-title>
            <v-spacer></v-spacer>
            <v-btn icon text @click="viewerDialog = false">
              <v-icon color="primary">mdi-close</v-icon>
            </v-btn>
          </v-toolbar>
          <!-- <v-card-text
            tabindex="0"
            @keydown.pageup="() => $refs.container.scrollTop -= 200"
            @keydown.pagedown="() => $refs.container.scrollTop += 200"
            @keydown.home="() => $refs.container.scrollTop = 0"
            @keydown.end="() => $refs.container.scrollTop = $refs.container.scrollHeight"
            ref="container"
            style="max-height: 500px; overflow-y: auto;"
          > -->
          <v-card-text
            tabindex="0"
            @keydown.pageup="() => $refs.container.scrollTop -= 200"
            @keydown.pagedown="() => $refs.container.scrollTop += 200"
            @keydown.home="() => $refs.container.scrollTop = 0"
            @keydown.end="() => $refs.container.scrollTop = $refs.container.scrollHeight"
            ref="container"
            style="height: calc(90vh - 64px); overflow-y: auto;"
            class="ml-3 pl-3"
          >
            <div id="modal-body" v-html="viewerHtml" class="markdown-content mx-4 px-0"></div>
          </v-card-text>

          <!-- <v-card-actions>
            <v-spacer></v-spacer>
            <v-btn @click="viewerDialog = false">Close</v-btn>
          </v-card-actions> -->
        </v-card>
      </v-dialog>

      <v-footer app border dark class="pa-0">
        <v-btn href="https://github.com/bokkypoobah/TheBokkyBible" target="_blank" color="primary" variant="plain" class="text-none">The Bokky Bible v0.95</v-btn>
        <v-spacer></v-spacer>
        <span class="mt-0">Co-created by</span>
        <v-btn href="https://x.com/BokkyPooBah" target="_blank" color="primary" variant="plain" class="text-none">BokkyPooBah</v-btn>
        <span class="mt-0">and</span>
        <v-btn href="https://x.com/grok/" target="_blank" color="primary" variant="plain" class="text-none">Grok AI</v-btn>
        <!-- <v-spacer></v-spacer> -->
        <!-- <span>Powered by Vuetify • Index updated: {{ lastUpdated }}</span> -->
      </v-footer>

    </v-app>
  </div>

  <script>
    const { createApp } = Vue
    const { createVuetify } = Vuetify
    const OWNER = 'bokkypoobah';
    const REPO = 'TheBokkyBible';
    const BRANCH = 'main';

    function now() {
      return moment().format("HH:mm:ss");
    }
    function formatLocalTime(t) {
      return moment.unix(t).format("YYYY-MM-DD HH:mm:ss");
    }
    function countHashes(text) {
      let i = 0;
      if (text) {
        while (text.substring(i, i + 1) == "#") {
          i++;
        }
      }
      return i;
    }
    function padLeft(s, l) {
      while (s.length < l) {
        s = " " + s;
      }
      return s;
    }
    function padRight(s, l) {
      while (s.length < l) {
        s = s + " ";
      }
      return s;
    }

    const vuetify = createVuetify({
      theme: { defaultTheme: 'light' }
    })

    const app = createApp({
      data() {
        return {
          tab: 'documents',
          db: null,
          documents: [],
          qas: [],
          minisearch: null,
          searchResults: [],
          docsPage: 1,
          docsPageSize: 25,
          qasPage: 1,
          qasPageSize: 25,
          searchPage: 1,
          searchPageSize: 25,
          searchKeyword: '',
          viewerDialog: false,
          viewerTitle: '',
          viewerHtml: '',
          sync: {
            info: null,
            completed: null,
            total: null,
            halt: false,
          },
          docHeaders: [
            { title: 'Date', key: 'date' },
            { title: 'Title', key: 'title' },
            { title: 'Keywords', key: 'keywords' }
          ],
          qaHeaders: [
            { title: 'Date', key: 'date' },
            { title: 'Question', key: 'question' },
            { title: 'Keywords', key: 'keywords' }
          ],
          searchHeaders: [
            { title: 'Type', key: 'type' },
            { title: 'Date', key: 'date' },
            { title: 'Title', key: 'title' }
          ]
        }
      },
      computed: {
        paginatedDocs() {
          const start = (this.docsPage - 1) * this.docsPageSize
          return this.documents.slice(start, start + this.docsPageSize)
        },
        docsTotalPages() {
          return Math.ceil(this.documents.length / this.docsPageSize)
        },
        paginatedQAs() {
          const start = (this.qasPage - 1) * this.qasPageSize
          return this.qas.slice(start, start + this.qasPageSize)
        },
        qasTotalPages() {
          return Math.ceil(this.qas.length / this.qasPageSize)
        },
        paginatedSearchResults() {
          const start = (this.searchPage - 1) * this.searchPageSize
          return this.searchResults.slice(start, start + this.searchPageSize)
        },
        searchTotalPages() {
          return Math.ceil(this.searchResults.length / this.searchPageSize)
        }
      },
      methods: {
        async initDB() {
          this.db = new Dexie('BokkyBibleSearch')
          this.db.version(4).stores({
            documents: '++id, filename, date, title, *keywords',
            fragments: '++id, docId, date, type, heading, text',
            qas: '++id, docId, date, question',
            metadata: 'key'
          })
          await this.db.open()
          console.log(now() + " initDB - IndexedDB ready");
        },

        async getLatestCommit() {
          const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/commits/${BRANCH}`);
          const data = await res.json();
          return { sha: data && data.sha || null, timestamp: data && data.commit && data.commit.author && data.commit.author.date && moment(data.commit.author.date).unix() || null };
        },

        async listMarkdownFiles() {
          const url = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
          const res = await fetch(url);
          const data = await res.json();
          return data.tree
            .filter(item => item.type === 'blob' && item.path.endsWith('.md') && /^docs\//.test(item.path))
            .map(item => ({ path: item.path, name: item.path.substring(5,), sortKey: item.path === "docs/README.md" ? 0 : (/^docs\/\d{8}_/.test(item.path) ? 1 : 2) /*, slug: item.path.replace(/\.md$/, '')*/ }))
            .sort((a,b) => (a.sortKey + a.path).localeCompare(b.sortKey + b.path));
        },

        async loadAllFiles() {
          const files = await this.listMarkdownFiles();
          // console.log(now() + " loadAllFiles - files: " + JSON.stringify(files, null, 2));

          await this.db.documents.clear();
          await this.db.qas.clear();

          this.sync.total = files.length;

          this.sync.completed = 0;
          for (const file of files) {
            console.log(now() + " loadAllFiles - file.path: " + file.path);
            this.sync.info = "Processing " + file.path;

            const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${file.path}`
            const text = await (await fetch(rawUrl)).text()

            // console.log(now() + " loadAllFiles - text: " + text);

            const date = file.name.split('_')[0] // YYYYMMDD
            const lines = text.split("\n")
            let title = ''
            for (let line of lines) {
              if (line.startsWith('## ')) {
                title = line.replace('## ', '').trim()
                break
              }
            }
            console.log(now() + " loadAllFiles - date: " + date + ", title: " + title);

            const keywords = this.extractKeywords(text)
            const doc = {
              filename: file.name,
              date,
              title: title || file.name,
              content: text,
              keywords: [...new Set(keywords)]
            }
            const docId = await this.db.documents.add(doc)

            // Split into Q&A
            const qaBlocks = text.split(/^### /m).slice(1)
            for (let block of qaBlocks) {
              const qaLines = block.split("\n")
              const question = qaLines[0].trim()
              const answer = qaLines.slice(1).join("\n").trim()
              if (!question) continue
              const qaKeywords = this.extractKeywords(question + ' ' + answer)
              await this.db.qas.add({
                docId,
                date,
                question,
                answer,
                keywords: [...new Set(qaKeywords)]
              })
            }
            this.sync.completed++;
          }
          this.refreshData();

        },

        async processFile(file, text) {
          const isChronicle = /^\d{8}_/.test(file.name);
          // const date = isChronicle ? moment(file.name.split('_')[0], "YYYYMMDD").unix() : null;
          // console.log(now() + " processFile - isChronicle: " + isChronicle + ", file.path: " + file.path + ", date: " + (date && date.toString() || "") + " " + (date && formatLocalTime(date) || file.name));
          const date = isChronicle ? file.name.split('_')[0] : null;
          console.log(now() + " processFile - isChronicle: " + isChronicle + ", file.path: " + file.path + ", date: " + (date || file.name));
          // console.log(now() + " processFile - file: " + JSON.stringify(file) + ", text: " + text.substring(1, 1000));

          const lines = text.split("\n");

          let title = null;
          for (let line of lines) {
            if (line.startsWith('## ')) {
              title = line.replace('## ', '').trim();
              break;
            }
          }
          console.log(now() + " processFile - title: " + title);
          const keywords = this.extractKeywords(text);
          const doc = {
            filename: file.name,
            date: date || file.name,
            title: title || file.name,
            content: text,
            keywords: [...new Set(keywords)],
          };
          const docId = await this.db.documents.add(doc);

          let inCodeBlock = false;
          let fragments = [];
          let currentFragment = null;
          let lineNumber = 0;
          let counters = [ 0, 0, 0 ];
          let previousHeading = null;
          let id = 0; // TODO: Use database autogenerated id
          for (const [index, line] of lines.entries()) {
            lineNumber = index + 1;
            if (line.trim().startsWith('```')) {
              inCodeBlock = !inCodeBlock;
            }
            if (inCodeBlock) {
              currentFragment.text += line + "\n";
              continue;
            }
            if (line.match(/^#{1,3}\s+(.+)$/)) {
              if (currentFragment) {
                currentFragment.text = currentFragment.text
                  .replace(/<br\s*\/>\s*---\s*<table[^>]*>[\s\S]*?<\/table>\s*$/, "")
                  .replace(/<br\s*\/>\s*---\s*$/, "")
                  .replace(/<br\s*\/>\s*$/, "")
                  .trim();
                fragments.push(currentFragment);
              }
              const headingLevel = countHashes(line);
              if (headingLevel > 0 && headingLevel <= 3) {
                // TODO: Could add check that lower level is not being set for the first time if the higher levels have been used
                counters[headingLevel - 1]++;
                for (let i = headingLevel + 1; i <= 3; i++) {
                  counters[i - 1] = 0;
                }
              }
              const heading = line.replace(/^#{1,3}\s+/gm, "");
              let type = "section";
              if (previousHeading == null) {
                // First heading
                if (isChronicle) {
                  type = "heading";
                } else if (heading.match(/^\s*Global Table Of Content\s*$/i)) {
                  type = "toc";
                }
                previousHeading = heading;
              } else {
                if (isChronicle) {
                  if (heading.match(/^\s*Table Of Content\s*$/i)) {
                    type = "toc";
                  } else {
                    type = "qa";
                  }
                }
              }
              currentFragment = {
                id: id++,
                lineNumber,
                heading,
                headingLevel,
                counters: [ ...counters ],
                type,
                text: "",
              };
            } else {
              if (currentFragment) {
                currentFragment.text += line + "\n";
              }
            }
          }
          if (currentFragment) {
            currentFragment.text = currentFragment.text
              .replace(/<br\s*\/>\s*---\s*<table[^>]*>[\s\S]*?<\/table>\s*$/, "")
              .replace(/<br\s*\/>\s*---\s*$/, "")
              .replace(/<br\s*\/>\s*$/, "")
              .trim();
            fragments.push(currentFragment);
          }
          console.log(now() + " line# | level |  l1 |  l2 |  l3 | type    | heading                                            | text                                               | ");
          console.log(now() + " ----- | ----- | --- | --- | --- | ------- | -------------------------------------------------- | -------------------------------------------------- | ");
          for (let fragment of fragments) {
            console.log(now() + " " +
              padLeft("" + fragment.lineNumber, 5) + " | " +
              padLeft("" + fragment.headingLevel, 5) + " | " +
              padLeft("" + fragment.counters[0], 3) + " | " +
              padLeft("" + fragment.counters[1], 3) + " | " +
              padLeft("" + fragment.counters[2], 3) + " | " +
              padRight(fragment.type, 7) + " | " +
              padRight(fragment.heading.substring(0, 50), 50) + " | " +
              padRight(fragment.text.replace(/\n/g, "↵").substring(0, 50), 50) + " | "
            );
            await this.db.fragments.add({
              docId,
              date: date || file.name,
              type: fragment.type,
              heading: fragment.heading,
              text: fragment.text,
            });
          }

          // let miniSearch = new MiniSearch({
          //   fields: ['heading', 'text'], // fields to index for full-text search
          //   storeFields: ['type', 'heading', 'text'] // fields to return with search results
          // });
          //
          // console.log(now() + " id    | line# | level |  l1 |  l2 |  l3 | type    | heading                                            | text                                               | ");
          // console.log(now() + " ----- | ----- | ----- | --- | --- | --- | ------- | -------------------------------------------------- | -------------------------------------------------- | ");
          // for (const [index, fragment] of fragments.entries()) {
          //   console.log(now() + " " +
          //     padLeft("" + fragment.id, 5) + " | " +
          //     padLeft("" + fragment.lineNumber, 5) + " | " +
          //     padLeft("" + fragment.headingLevel, 5) + " | " +
          //     padLeft("" + fragment.counters[0], 3) + " | " +
          //     padLeft("" + fragment.counters[1], 3) + " | " +
          //     padLeft("" + fragment.counters[2], 3) + " | " +
          //     padRight(fragment.type, 7) + " | " +
          //     padRight(fragment.heading.substring(0, 50), 50) + " | " +
          //     padRight(fragment.text.replace(/\n/g, "↵").substring(0, 50), 50) + " | "
          //   );
          // }
          //
          // // Index all documents
          // miniSearch.addAll(fragments);
          //
          // // Search with default options
          // let results = miniSearch.search('youtub', { fuzzy: 0.2 });
          // // let results = miniSearch.search('youtube angels');
          // // let results = miniSearch.search('the');
          // console.log(JSON.stringify(results, null, 2));
        },

        async testItMinisearch() {
          // A collection of documents for our examples
          const documents = [
            {
              id: 1,
              title: 'Moby Dick',
              text: 'Call me Ishmael. Some years ago...',
              category: 'fiction'
            },
            {
              id: 2,
              title: 'Zen and the Art of Motorcycle Maintenance',
              text: 'I can see by my watch...',
              category: 'fiction'
            },
            {
              id: 3,
              title: 'Neuromancer',
              text: 'The sky above the port was...',
              category: 'fiction'
            },
            {
              id: 4,
              title: 'Zen and the Art of Archery',
              text: 'At first sight it must seem...',
              category: 'non-fiction'
            },
            // ...and more
          ];

          let miniSearch = new MiniSearch({
            fields: ['title', 'text'], // fields to index for full-text search
            storeFields: ['title', 'category'] // fields to return with search results
          });

          // Index all documents
          miniSearch.addAll(documents);

          // Search with default options
          let results = miniSearch.search('zen art arcger');
          console.log(JSON.stringify(results, null, 2));
        },

        async testIt() {
          console.log(now() + " testIt");
          const files = (await this.listMarkdownFiles()).filter(item => /^20260222/.test(item.name));
          // const files = (await this.listMarkdownFiles());

          await this.db.documents.clear();
          await this.db.fragments.clear();

          // const files = (await this.listMarkdownFiles());
          for (const file of files) {
            // console.log(now() + " testIt - file: " + JSON.stringify(file));
            const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${file.path}`
            const text = await (await fetch(rawUrl)).text()
            await this.processFile(file, text);
            // console.log(now() + " testIt - text: " + text);
          }
        },

        extractKeywords(text) {
          return text.toLowerCase()
            .replace(/[^\w\s]/g, ' ')
            .split(/\s+/)
            .filter(w => w.length > 3)
        },

        showAllKeywords(item) {
          const all = item.keywords.join(' • ')
          alert(`All keywords for this item:\n\n${all}`)
          // Or upgrade to a nice v-dialog if you want fancier
        },

        async refreshData() {
          this.documents = await this.db.documents.toArray();
          this.qas = await this.db.qas.toArray();
          // console.log(now() + " refreshData - qas: " + JSON.stringify(this.qas.slice(0, 5), null, 2));
          const item = this.qas[0];
          // console.log(now() + " refreshData - item: " + JSON.stringify(item, null, 2));
          this.miniSearch = new MiniSearch({
            fields: ['question', 'answer'], // fields to index for full-text search
            storeFields: ['question', 'answer', 'date'] // fields to return with search results
          });

          // Index all documents
          console.log(now() + " refreshData - index start: " + this.qas.length);
          this.miniSearch.addAll(this.qas);
          console.log(now() + " refreshData - index end: " + this.qas.length);

          // Search with default options
          let results = this.miniSearch.search('youtube angels');
          console.log(now() + " refreshData - search results: " + JSON.stringify(results, null, 2));

        },

        async checkForUpdates() {
          const meta = await this.db.metadata.get('lastCommit');
          console.log(now() + " checkForUpdates - previous sha: " + (meta && meta.sha || "(none)") + ", timestamp: " + (meta && meta.timestamp && (meta.timestamp + " " + formatLocalTime(meta.timestamp)) || "(none)"));
          this.sync.info = "Getting latest information";
          this.sync.total = null;
          const latestCommit = await this.getLatestCommit();
          this.sync.completed = 1;
          console.log(now() + " checkForUpdates - latest   sha: " + (latestCommit && latestCommit.sha || "(none)") + ", timestamp: " + (latestCommit && latestCommit.timestamp && (latestCommit.timestamp + " " + formatLocalTime(latestCommit.timestamp)) || "(none)"));
          const testing = true;
          if (!meta || meta.sha !== latestCommit.sha || testing) {
            console.log(now() + " checkForUpdates - New content detected – re-indexing...");
            await this.loadAllFiles();
            await this.db.metadata.put({ key: 'lastCommit', sha: latestCommit.sha, timestamp: latestCommit.timestamp });
          } else {
            console.log(now() + " checkForUpdates - Already up to date");
          }
          this.sync.info = null;
        },

        async viewDocument(doc) {
          this.viewerTitle = doc.title;
          // Sanitize before parsing
          const safeContent = doc.content.replace(/<script/gi, '&lt;script');
          this.viewerHtml = marked.parse(safeContent);
          this.viewerDialog = true;
          await Vue.nextTick();
          // External links in new tab
          // document.querySelectorAll('#modal-body a[href^="http"]').forEach(a => {
          //   a.target = '_blank';
          //   a.rel = 'noopener noreferrer';
          // });

          // // Inside your Vue component (e.g., using <script setup>)
          document.querySelectorAll('#modal-body a').forEach(a => {
            const href = a.getAttribute('href');
            console.log("a: " + JSON.stringify(a) + ", href: " + JSON.stringify(href));

            if (href) {
              if (href.startsWith("http")) {
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
              } else if (!href.startsWith("#")) {
                a.addEventListener('click', (event) => {
                  event.preventDefault();
                  // Execute your Vuetify/Vue function
                  console.log('Custom Vuetify function triggered for:', href);
                  // Example: navigate or emit event
                  // router.push('/some-route') or emit('custom-event', href)
                });
              }
            }
            // if (href && !href.startsWith('http') && !href.startsWith('#')) {
            //   a.addEventListener('click', (event) => {
            //     event.preventDefault();
            //     // Execute your Vuetify/Vue function
            //     console.log('Custom Vuetify function triggered for:', href);
            //     // Example: navigate or emit event
            //     // router.push('/some-route') or emit('custom-event', href)
            //   });
            // }
          });

        },

        viewQA(qa) {
          this.viewerTitle = qa.question;
          const safeAnswer = qa.answer.replace(/<script/gi, '&lt;script');
          this.viewerHtml = `<h3>${qa.question}</h3>\n\n${marked.parse(safeAnswer)}`;
          this.viewerDialog = true;
          // External links in new tab
          // document.querySelectorAll('#modal-body a[href^="http"]').forEach(a => {
          //   a.target = '_blank';
          //   a.rel = 'noopener noreferrer';
          // });
        },

        async performKeywordSearch() {
          if (!this.searchKeyword) return
          const term = this.searchKeyword.toLowerCase()
          const docMatches = await this.db.documents
            .filter(doc => doc.keywords.some(k => k.includes(term)) || doc.title.toLowerCase().includes(term))
            .toArray()
          const qaMatches = await this.db.qas
            .filter(qa => qa.keywords.some(k => k.includes(term)) || qa.question.toLowerCase().includes(term))
            .toArray()

          this.searchResults = [
            ...docMatches.map(d => ({ type: 'document', date: d.date, title: d.title, id: d.id })),
            ...qaMatches.map(q => ({ type: 'qa', date: q.date, title: q.question, id: q.id }))
          ]
          this.searchPage = 1
        },

        viewSearchItem(item) {
          if (item.type === 'document') {
            this.db.documents.get(item.id).then(doc => this.viewDocument(doc))
          } else {
            this.db.qas.get(item.id).then(qa => this.viewQA(qa))
          }
        },

        prevPage(tab) {
          if (tab === 'docs') this.docsPage = Math.max(1, this.docsPage - 1)
          else if (tab === 'qas') this.qasPage = Math.max(1, this.qasPage - 1)
          else this.searchPage = Math.max(1, this.searchPage - 1)
        },
        nextPage(tab) {
          if (tab === 'docs') this.docsPage = Math.min(this.docsTotalPages, this.docsPage + 1)
          else if (tab === 'qas') this.qasPage = Math.min(this.qasTotalPages, this.qasPage + 1)
          else this.searchPage = Math.min(this.searchTotalPages, this.searchPage + 1)
        }
      },
      async mounted() {
        await this.initDB()
        // Create metadata if missing
        // const meta = await this.db.metadata.get('lastUpdated')
        // if (!meta) await this.db.metadata.put({ key: 'lastUpdated', value: Date.now() })
        // await this.loadAllFiles()
        this.refreshData()
      }
    })

    app.use(vuetify)
    app.mount('#app')
  </script>
