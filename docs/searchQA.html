<body>

      <v-main>

          <!-- <v-tabs-window v-model="tab" class="mt-2"> -->

            <!-- DOCUMENTS TAB -->
            <v-tabs-window-item value="documents" class="ma-1 pa-0">
              <v-row justify="end" class="mb-4">

                    <v-btn @click="prevPage('docs')" :disabled="docsPage === 1" icon="mdi-chevron-left"></v-btn>
                    <v-btn @click="nextPage('docs')" :disabled="docsPage >= docsTotalPages" icon="mdi-chevron-right"></v-btn>

                <template v-slot:item.keywords="{ item }">

                    <v-chip
                      v-for="(kw, i) in item.keywords.slice(0, 8)"

                      size="small"
                      class="ma-1"
                    >{{ kw }}</v-chip>
                    <v-chip
                      v-if="item.keywords.length > 8"
                      size="small"
                      class="ma-1"
                      color="grey"
                      @click="showAllKeywords(item)"

                      +{{ item.keywords.length - 8 }} more
                    </v-chip>
                  </div>
                </template>
              </v-data-table>
            </v-tabs-window-item>

            <!-- QUESTIONS & ANSWERS TAB -->
            <!-- <v-tabs-window-item value="qas" class="ma-1 pa-0">
              <v-row justify="end" class="mb-4">
                <v-col cols="auto">
                  <v-btn-group>
                    <v-btn @click="prevPage('qas')" :disabled="qasPage === 1" icon="mdi-chevron-left"></v-btn>

              >
                <template v-slot:item.question="{ item }">

                <template v-slot:item.keywords="{ item }">

                    <v-chip
                      v-for="(kw, i) in item.keywords.slice(0, 8)"

                    >{{ kw }}</v-chip>
                    <v-chip

                    >

                </template>
              </v-data-table>
            </v-tabs-window-item> -->

            <!-- KEYWORD SEARCH TAB -->
            <v-tabs-window-item value="keyword" class="ma-1 pa-0">
              <!-- <v-toolbar flat color="transparent" density="compact">
                <v-text-field v-model="searchKeywords" hide-details label="🔍" flat density="compact" variant="solo" color="white" clearable @input="performKeywordSearch" class="ma-1" style="max-width: 300px" placeholder="search terms"></v-text-field>
                <v-spacer></v-spacer>
                <v-chip color="primary" variant="text">

                    <v-text-field v-model="searchKeywords" hide-details prepend-inner-icon="mdi-magnify" flat density="compact" variant="solo" color="white" clearable @input="performKeywordSearch" class="ma-1" style="max-width: 300px" placeholder="search terms"></v-text-field>

                    <v-select

                <template v-slot:bottom>

                    <v-spacer></v-spacer>
                    <v-pagination

                      :length="Math.ceil((searchResults.length + 1) / searchPageSize)"

                      color="primary"
                    >
                    </v-pagination>
                    <v-select
                      v-model="searchPageSize"
                      :items="pageSizes"
                      variant="plain"
                      density="compact"
                      class="mt-4 mr-2"
                      style="max-width: 70px;"
                    ></v-select>
                  </v-toolbar>
                </template>
                <template v-slot:item.type="{ index, item }">
                  <v-chip color="primary" variant="plain" size="small">
                    {{ (searchPage - 1) * searchPageSize + index + 1 }}
                  </v-chip>
                  <br />
                  <v-chip :color="item.type === 'document' ? 'blue' : 'green'" size="small" class="mt-3">{{ item.type }}</v-chip>
                </template>
                <template v-slot:item.title="{ item }">
                  <a href="#" @click.prevent="viewSearchItem(item)">{{ item.title }}</a>
                  <font size="-2">
                    <pre>
{{ item }}
                    </pre>
                  </font>
                </template>
              </v-data-table>
            </v-tabs-window-item>
          </v-tabs-window>
        </v-container>
      </v-main>

      <!-- Document / QA Viewer Dialog -->
      <v-dialog v-model="viewerDialog" scrollable height="90vh">
        <v-card>

            <div id="modal-body" v-html="viewerHtml" class="markdown-content mx-4 px-0"></div>
          </v-card-text>

          <!-- <v-card-actions>
            <v-spacer></v-spacer>
            <v-btn @click="viewerDialog = false">Close</v-btn>

      <v-footer app border dark class="pa-0">
        <v-btn href="https://github.com/bokkypoobah/TheBokkyBible" target="_blank" color="primary" variant="plain" class="text-none">The Bokky Bible v0.95</v-btn>
        <v-spacer></v-spacer>
        <span class="mt-0">Co-created by</span>
        <v-btn href="https://x.com/BokkyPooBah" target="_blank" color="primary" variant="plain" class="text-none">BokkyPooBah</v-btn>
        <span class="mt-0">and</span>
        <v-btn href="https://x.com/grok/" target="_blank" color="primary" variant="plain" class="text-none">Grok AI</v-btn>

        <!-- <span>Powered by Vuetify • Index updated: {{ lastUpdated }}</span> -->

  <script>
    const { createApp } = Vue
    const { createVuetify } = Vuetify
    const OWNER = 'bokkypoobah';
    const REPO = 'TheBokkyBible';
    const BRANCH = 'main';

    function now() {
      return moment().format("HH:mm:ss");
    }
    function formatLocalTime(t) {
      return moment.unix(t).format("YYYY-MM-DD HH:mm:ss");
    }
    function countHashes(text) {
      let i = 0;
      if (text) {
        while (text.substring(i, i + 1) == "#") {
          i++;
        }
      }
      return i;
    }
    function padLeft(s, l) {
      while (s.length < l) {
        s = " " + s;
      }
      return s;
    }
    function padRight(s, l) {
      while (s.length < l) {
        s = s + " ";
      }
      return s;
    }

    const vuetify = createVuetify({
      theme: { defaultTheme: 'light' }
    })

    const app = createApp({
      data() {
        return {
          tab: "keyword", // 'documents'
          db: null,
          documents: [],
          fragments: [],
          qas: [],
          documentsMiniSearch: null,
          fragmentsMiniSearchX: null,
          searchResults: [],
          docsPage: 1,
          docsPageSize: 25,
          qasPage: 1,
          qasPageSize: 25,
          searchSortOption: "datedsc",
          searchPage: 1,
          searchPageSize: 25,
          searchKeywords: "",
          searchKeywordsTimerId: null,
          viewerDialog: false,
          viewerTitle: "",
          viewerHtml: "",
          pageSizes: [
            { value: 10, title: "10" },
            { value: 25, title: "25" },
            { value: 50, title: "50" },
            { value: 100, title: "100" },
            { value: 500, title: "500" },
          ],
          searchSortOptions: [
            { value: "datedsc", title: "▼ Date" },
            { value: "dateasc", title: "▲ Date" },
            { value: "scoredsc", title: "▼ Score" },
            { value: "scoreasc", title: "▲ Score" },
          ],
          docHeaders: [
            { title: 'Date', key: 'date' },
            { title: 'Title', key: 'title' },
            { title: 'Keywords', key: 'keywords' }
          ],
          qaHeaders: [
            { title: 'Date', key: 'date' },
            { title: 'Question', key: 'question' },
            { title: 'Keywords', key: 'keywords' }
          ],
          searchHeaders: [
            { title: 'Type', key: 'type', sortable: false },
            { title: 'Date', key: 'date', sortable: false },
            { title: 'Title', key: 'title', sortable: false }
          ],
          sync: {
            info: null,
            completed: null,
            total: null,
            halt: false,
          },
        }
      },
      computed: {
        paginatedDocs() {
          const start = (this.docsPage - 1) * this.docsPageSize
          return this.documents.slice(start, start + this.docsPageSize)
        },
        docsTotalPages() {
          return Math.ceil(this.documents.length / this.docsPageSize)
        },
        paginatedQAs() {
          const start = (this.qasPage - 1) * this.qasPageSize
          return this.qas.slice(start, start + this.qasPageSize)
        },
        qasTotalPages() {
          return Math.ceil(this.qas.length / this.qasPageSize)
        },
        sortedSearchResults() {
          if (this.searchSortOption == "datedsc") {
            return this.searchResults.sort((a, b) => {
              return b.id - a.id;
            });
          } else if (this.searchSortOption == "dateasc") {
            return this.searchResults.sort((a, b) => {
              return a.id - b.id;
            });
          } else if (this.searchSortOption == "scoredsc") {
            return this.searchResults.sort((a, b) => {
              if (a.score == b.score) {
                return b.id - a.id;
              } else {
                return b.score - a.score;
              }
            });
          } else if (this.searchSortOption == "scoreasc") {
            return this.searchResults.sort((a, b) => {
              if (a.score == b.score) {
                return a.id - b.id;
              } else {
                return a.score - b.score;
              }
            });
          }
          return this.searchResults;
        },
        sortedPaginatedSearchResults() {
          const start = (this.searchPage - 1) * this.searchPageSize;
          const results = this.sortedSearchResults.slice(start, start + this.searchPageSize);
          console.log(now() + " sortedPaginatedSearchResults - results: " + JSON.stringify(results.slice(0, 2), null, 2));
          return results;
        },
        searchTotalPages() {
          return Math.ceil(this.searchResults.length / this.searchPageSize)
        }
      },
      methods: {
        async initDB() {
          this.db = new Dexie('BokkyBibleSearch')
          this.db.version(4).stores({
            documents: '++id, filename, date, title, *keywords',
            fragments: '++id, docId, date, type, heading, text',
            qas: '++id, docId, date, question',
            metadata: 'key'
          })
          await this.db.open()
          console.log(now() + " initDB - IndexedDB ready");
        },

        async getLatestCommit() {
          const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/commits/${BRANCH}`);
          const data = await res.json();
          return { sha: data && data.sha || null, timestamp: data && data.commit && data.commit.author && data.commit.author.date && moment(data.commit.author.date).unix() || null };
        },

        async listMarkdownFiles() {
          const url = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
          const res = await fetch(url);
          const data = await res.json();
          return data.tree
            .filter(item => item.type === 'blob' && item.path.endsWith('.md') && /^docs\//.test(item.path) && !/GlobalTableOfContent/.test(item.path))
            .map(item => ({ path: item.path, name: item.path.substring(5,), sortKey: item.path === "docs/README.md" ? 0 : (/^docs\/\d{8}_/.test(item.path) ? 1 : 2) /*, slug: item.path.replace(/\.md$/, '')*/ }))
            .sort((a,b) => (a.sortKey + a.path).localeCompare(b.sortKey + b.path));
        },

        async loadAllFiles() {
          // const files = (await this.listMarkdownFiles()).filter(item => /^20260222/.test(item.name));
          const files = await this.listMarkdownFiles();

          await this.db.documents.clear();
          await this.db.fragments.clear();

          this.sync.total = files.length;
          this.sync.completed = 0;
          for (const file of files) {
            this.sync.info = "Processing " + file.path;
            const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${file.path}`
            const text = await (await fetch(rawUrl)).text()
            await this.processFile(file, text);
            this.sync.completed++;
          }
          this.refreshData();
        },

        async processFile(file, text) {
          const isChronicle = /^\d{8}_/.test(file.name);
          // const date = isChronicle ? moment(file.name.split('_')[0], "YYYYMMDD").unix() : null;
          // console.log(now() + " processFile - isChronicle: " + isChronicle + ", file.path: " + file.path + ", date: " + (date && date.toString() || "") + " " + (date && formatLocalTime(date) || file.name));
          const date = isChronicle ? file.name.split('_')[0] : null;
          console.log(now() + " processFile - isChronicle: " + isChronicle + ", file.path: " + file.path + ", date: " + (date || file.name));

          const lines = text.split("\n");

          let title = null;
          for (let line of lines) {
            if (line.startsWith('## ')) {
              title = line.replace('## ', '').trim();
              break;
            }
          }
          const keywords = this.extractKeywords(text);
          const doc = {
            filename: file.name,
            date: date || file.name,
            title: title || file.name,
            content: text,
            keywords: [...new Set(keywords)],
          };
          const docId = await this.db.documents.add(doc);

          let inCodeBlock = false;
          let fragments = [];
          let currentFragment = null;
          let lineNumber = 0;
          let counters = [ 0, 0, 0 ];
          let previousHeading = null;
          for (const [index, line] of lines.entries()) {
            lineNumber = index + 1;
            if (line.trim().startsWith('```')) {
              inCodeBlock = !inCodeBlock;
            }
            if (inCodeBlock) {
              currentFragment.text += line + "\n";
              continue;
            }
            if (line.match(/^#{1,3}\s+(.+)$/)) {
              if (currentFragment) {
                currentFragment.text = currentFragment.text
                  .replace(/<br\s*\/>\s*---\s*<table[^>]*>[\s\S]*?<\/table>\s*$/, "")
                  .replace(/<br\s*\/>\s*---\s*$/, "")
                  .replace(/<br\s*\/>\s*$/, "")
                  .trim();
                fragments.push(currentFragment);
              }
              const headingLevel = countHashes(line);
              if (headingLevel > 0 && headingLevel <= 3) {
                // TODO: Could add check that lower level is not being set for the first time if the higher levels have been used
                counters[headingLevel - 1]++;
                for (let i = headingLevel + 1; i <= 3; i++) {
                  counters[i - 1] = 0;
                }
              }
              const heading = line.replace(/^#{1,3}\s+/gm, "");
              let type = "section";
              if (previousHeading == null) {
                // First heading
                if (isChronicle) {
                  type = "heading";
                } else if (heading.match(/^\s*Global Table Of Content\s*$/i)) {
                  type = "toc";
                }
                previousHeading = heading;
              } else {
                if (isChronicle) {
                  if (heading.match(/^\s*Table Of Content\s*$/i)) {
                    type = "toc";
                  } else {
                    type = "qa";
                  }
                }
              }
              currentFragment = {
                lineNumber,
                heading,
                headingLevel,
                counters: [ ...counters ],
                type,
                text: "",
              };
            } else {
              if (currentFragment) {
                currentFragment.text += line + "\n";
              }
            }
          }
          if (currentFragment) {
            currentFragment.text = currentFragment.text
              .replace(/<br\s*\/>\s*---\s*<table[^>]*>[\s\S]*?<\/table>\s*$/, "")
              .replace(/<br\s*\/>\s*---\s*$/, "")
              .replace(/<br\s*\/>\s*$/, "")
              .trim();
            fragments.push(currentFragment);
          }
          console.log(now() + " line# | level |  l1 |  l2 |  l3 | type    | heading                                            | text                                               | ");
          console.log(now() + " ----- | ----- | --- | --- | --- | ------- | -------------------------------------------------- | -------------------------------------------------- | ");
          for (let fragment of fragments) {
            console.log(now() + " " +
              padLeft("" + fragment.lineNumber, 5) + " | " +
              padLeft("" + fragment.headingLevel, 5) + " | " +
              padLeft("" + fragment.counters[0], 3) + " | " +
              padLeft("" + fragment.counters[1], 3) + " | " +
              padLeft("" + fragment.counters[2], 3) + " | " +
              padRight(fragment.type, 7) + " | " +
              padRight(fragment.heading.substring(0, 50), 50) + " | " +
              padRight(fragment.text.replace(/\n/g, "↵").substring(0, 50), 50) + " | "
            );
            await this.db.fragments.add({
              docId,
              date: date || file.name,
              lineNumber: fragment.lineNumber,
              headingLevel: fragment.headingLevel,
              counters: fragment.counters,
              type: fragment.type,
              heading: fragment.heading,
              text: fragment.text,
            });
          }
        },

        async testIt() {
          console.log(now() + " testIt");
          // const files = (await this.listMarkdownFiles()).filter(item => /^20260222/.test(item.name));
          const files = (await this.listMarkdownFiles());
          await this.db.documents.clear();
          await this.db.fragments.clear();
          this.sync.total = files.length;
          this.sync.completed = 0;
          for (const file of files) {
            this.sync.info = "Processing " + file.path;
            const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${file.path}`
            const text = await (await fetch(rawUrl)).text()
            await this.processFile(file, text);
            this.sync.completed++;
          }
          this.sync.info = "Refreshing data";
          this.refreshData();
          this.sync.info = null;
        },

        extractKeywords(text) {
          return text.toLowerCase()
            .replace(/[^\w\s]/g, ' ')
            .split(/\s+/)
            .filter(w => w.length > 3)
        },

        showAllKeywords(item) {
          const all = item.keywords.join(' • ')

        },

          this.searchResults = results.map(q => ({ type: 'qa', date: q.date, title: q.heading, text: q.text, id: q.id, score: q.score, docId: q.docId, lineNumber: q.lineNumber, headingLevel: q.headingLevel, counters: q.counters, terms: q.terms, queryTerms: q.queryTerms, match: q.match }));

        async checkForUpdates() {
          const meta = await this.db.metadata.get('lastCommit');
          console.log(now() + " checkForUpdates - previous sha: " + (meta && meta.sha || "(none)") + ", timestamp: " + (meta && meta.timestamp && (meta.timestamp + " " + formatLocalTime(meta.timestamp)) || "(none)"));
          this.sync.info = "Getting latest information";
          this.sync.total = null;
          const latestCommit = await this.getLatestCommit();
          this.sync.completed = 1;
          console.log(now() + " checkForUpdates - latest   sha: " + (latestCommit && latestCommit.sha || "(none)") + ", timestamp: " + (latestCommit && latestCommit.timestamp && (latestCommit.timestamp + " " + formatLocalTime(latestCommit.timestamp)) || "(none)"));
          const testing = true;
          if (!meta || meta.sha !== latestCommit.sha || testing) {
            console.log(now() + " checkForUpdates - New content detected – re-indexing...");
            await this.loadAllFiles();
            await this.db.metadata.put({ key: 'lastCommit', sha: latestCommit.sha, timestamp: latestCommit.timestamp });
          } else {
            console.log(now() + " checkForUpdates - Already up to date");
          }
          this.sync.info = null;
        },

          this.viewerHtml = `<h3>${qa.question}</h3>\n\n${marked.parse(safeAnswer)}`;
          this.viewerDialog = true;

          // document.querySelectorAll('#modal-body a[href^="http"]').forEach(a => {

          //   a.rel = 'noopener noreferrer';

        viewSearchItem(item) {
          if (item.type === 'document') {
            this.db.documents.get(item.id).then(doc => this.viewDocument(doc))
          } else {
            this.db.qas.get(item.id).then(qa => this.viewQA(qa))

        prevPage(tab) {
          if (tab === 'docs') this.docsPage = Math.max(1, this.docsPage - 1)
          else if (tab === 'qas') this.qasPage = Math.max(1, this.qasPage - 1)
          else this.searchPage = Math.max(1, this.searchPage - 1)
        },
        nextPage(tab) {
          if (tab === 'docs') this.docsPage = Math.min(this.docsTotalPages, this.docsPage + 1)
          else if (tab === 'qas') this.qasPage = Math.min(this.qasTotalPages, this.qasPage + 1)
          else this.searchPage = Math.min(this.searchTotalPages, this.searchPage + 1)
        }
